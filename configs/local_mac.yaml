# Configuration for local Mac with 48GB unified memory
# Uses 8-bit quantization with CPU offload

model:
  name: "mistralai/Mixtral-8x7B-v0.1"
  cache_dir: null
  device_map: "auto"
  torch_dtype: "float16"
  trust_remote_code: true
  # 8-bit quantization (bitsandbytes works better than 4-bit on Mac)
  load_in_8bit: true
  llm_int8_enable_fp32_cpu_offload: true  # Required for Mac

data:
  # Start small for dry run
  dataset_name: "openwebtext"
  num_samples: 50  # Small batch first
  max_length: 256  # Shorter sequences for faster testing
  seed: 42

routing_analysis:
  output_dir: "outputs/routing_logs"
  save_frequency: 10

analysis:
  output_dir: "outputs/analysis"
  plot_dir: "outputs/plots"
