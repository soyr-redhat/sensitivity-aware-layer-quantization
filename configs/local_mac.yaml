# Configuration for local Mac with 48GB unified memory
# Uses 4-bit quantization to fit Mixtral-8x7B

model:
  name: "mistralai/Mixtral-8x7B-v0.1"
  cache_dir: null
  device_map: "auto"
  torch_dtype: "float16"
  trust_remote_code: true
  # 4-bit quantization settings
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"  # NormalFloat4 - good balance
  bnb_4bit_use_double_quant: true  # Extra compression

data:
  # Start small for dry run
  dataset_name: "openwebtext"
  num_samples: 50  # Small batch first
  max_length: 256  # Shorter sequences for faster testing
  seed: 42

routing_analysis:
  output_dir: "outputs/routing_logs"
  save_frequency: 10

analysis:
  output_dir: "outputs/analysis"
  plot_dir: "outputs/plots"
