# Configuration for MoE Dynamic Quantization experiments

model:
  name: "mistralai/Mixtral-8x7B-v0.1"
  cache_dir: null  # Set to a path to cache model weights
  device_map: "auto"
  torch_dtype: "bfloat16"  # or "float16"
  trust_remote_code: true

data:
  # Dataset for routing analysis
  dataset_name: "openwebtext"  # or "c4", "wikitext", etc.
  num_samples: 1000
  max_length: 512
  seed: 42

routing_analysis:
  output_dir: "outputs/routing_logs"
  save_frequency: 100  # Save every N samples

analysis:
  output_dir: "outputs/analysis"
  plot_dir: "outputs/plots"
