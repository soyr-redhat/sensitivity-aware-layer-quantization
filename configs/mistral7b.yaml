model:
  name: mistralai/Mistral-7B-Instruct-v0.3
  cache_dir: /workspace/model_cache
  torch_dtype: bfloat16
  device_map: auto
  load_in_4bit: false
  load_in_8bit: false

data:
  prompt_types:
    - code
    - math
    - creative
    - factual
    - reasoning
  samples_per_type: 20
  max_length: 512

activation_analysis:
  output_dir: /workspace/outputs/activations
  save_raw_activations: false  # Too large, we'll aggregate
  layers_to_track: all  # or specify list [0, 5, 10, 15, 20, 25, 30]

analysis:
  output_dir: /workspace/outputs/analysis
  plot_dir: /workspace/outputs/plots
