---
apiVersion: batch/v1
kind: Job
metadata:
  name: mixtral-routing-analysis
  namespace: user-sbowerma
  labels:
    app: mixtral-routing-analysis
    kueue.x-k8s.io/queue-name: unreserved
spec:
  template:
    metadata:
      labels:
        app: mixtral-routing-analysis
        kueue.x-k8s.io/queue-name: unreserved
    spec:
      restartPolicy: Never
      containers:
      - name: analysis
        image: python:3.12-slim
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Installing dependencies..."
          pip install --quiet torch transformers accelerate datasets numpy pandas matplotlib seaborn tqdm pyyaml scipy

          echo "Cloning analysis code..."
          cd /workspace
          # We'll mount the code via ConfigMap or copy it

          echo "Running routing analysis..."
          python /code/01_analyze_routing.py --config /config/openshift.yaml

          echo "Analysis complete! Results in /outputs"
          ls -lh /outputs/
        resources:
          limits:
            nvidia.com/mig-3g.71gb: "1"
            memory: "32Gi"
            cpu: "8"
          requests:
            nvidia.com/mig-3g.71gb: "1"
            memory: "32Gi"
            cpu: "8"
        volumeMounts:
        - mountPath: /workspace
          name: workspace
        - mountPath: /model-cache
          name: model-cache
        - mountPath: /outputs
          name: outputs
        env:
        - name: HF_HOME
          value: /model-cache
        - name: TRANSFORMERS_CACHE
          value: /model-cache
      volumes:
      - name: workspace
        emptyDir: {}
      - name: model-cache
        persistentVolumeClaim:
          claimName: vllm-model-cache
      - name: outputs
        emptyDir: {}
