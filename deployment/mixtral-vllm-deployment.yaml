---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mixtral-moe
  namespace: user-sbowerma
  labels:
    app: vllm-mixtral-moe
    kueue.x-k8s.io/queue-name: unreserved
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-mixtral-moe
  template:
    metadata:
      labels:
        app: vllm-mixtral-moe
        kueue.x-k8s.io/queue-name: unreserved
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.6.6
        args:
        - --model
        - mistralai/Mixtral-8x7B-Instruct-v0.1
        - --host
        - 0.0.0.0
        - --port
        - "8000"
        - --max-model-len
        - "4096"
        - --gpu-memory-utilization
        - "0.85"
        - --trust-remote-code
        env:
        - name: HOME
          value: /tmp
        - name: HF_HOME
          value: /model-cache
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          limits:
            nvidia.com/mig-3g.71gb: "1"
          requests:
            nvidia.com/mig-3g.71gb: "1"
        volumeMounts:
        - mountPath: /model-cache
          name: model-cache
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: vllm-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-mixtral-moe
  namespace: user-sbowerma
  labels:
    app: vllm-mixtral-moe
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: vllm-mixtral-moe
